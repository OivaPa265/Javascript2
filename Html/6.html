<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
let lista = [];

function noppa() {
    let heitto;

    do {
        heitto = Math.floor(Math.random() * 6) + 1;
        lista.push(heitto);
        alert(lista);
    } while (heitto !== 6);
}

noppa();

</script>

</body>
</html>
